name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run lint
      run: npm run lint
      
    - name: TypeScript check
      run: npx tsc --noEmit
      
    - name: Build
      run: npm run build
      env:
        # Pass dummy env vars if build requires them
        VITE_SUPABASE_URL: "https://example.supabase.co"
        VITE_SUPABASE_ANON_KEY: "dummy-key"
